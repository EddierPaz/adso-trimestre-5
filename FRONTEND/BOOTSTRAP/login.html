<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="css/bootstrap.css">
    <link rel="stylesheet" href="estilos1.css">
</head>

<body class="bg-info">
   <!-- Contenedor principal -->
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="row w-100">
            <div class="col-md-4 offset-md-4 p-4 border rounded bg-white shadow">
                
                <!-- Imagen de usuario -->
                <div class="text-center">
                    <img src="ejemplo-cuadrado.png" class="rounded-circle border border-secondary p-1" alt="Usuario">
                </div>
                <h2 class="text-center text-primary mt-3">Iniciar Sesión</h2>
                <!-- Formulario -->
                <form class="mt-3">
                    <div class="mb-3">
                        <label class="form-label text-dark">Usuario</label>
                        <input type="text" class="form-control border border-secondary" placeholder="Ingresa tu usuario">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-dark">Contraseña</label>
                        <input type="password" class="form-control border border-secondary" placeholder="Ingresa tu contraseña">
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                    </div>
                </form>
                <!-- Pie de página -->
                <div class="text-center mt-3">
                    <p class="text-muted">¿No tienes cuenta? <a href="#" class="text-primary">Regístrate</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
