<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="css/bootstrap.css">
    <link rel="stylesheet" href="estilos1.css">
</head>

<body>
    <!-- Contenedor principal Bootstrap centrado con margen superior de 3 unidades (mt-5) -->
    <div class="container mt-5">

        <!-- Título centrado horizontalmente con la clase text-center -->
        <h1 class="text-center">Ejemplo de Imágenes con Bootstrap</h1>

        <!-- ===== PRIMERA FILA ===== -->
        <div class="row">

            <!-- Columna con fondo rojo (bg-danger), ancho completo en móvil, 1/3 en tablet+ -->
            <div class="col-12 col-md-4 bg-danger">
                <!-- img-fluid: la imagen es responsive (se adapta al ancho del contenedor)
                 rounded: bordes completamente redondeados (forma de círculo/óvalo) -->
                <img src="..." alt="Imagen 1" class="img-fluid rounded">
                <p class="text-center">.img-fluid .rounded</p>
            </div>

            <!-- Columna con fondo gris (bg-secondary) -->
            <div class="col-12 col-md-4 bg-secondary">
                <!-- rounded-circle: convierte la imagen en un círculo perfecto -->
                <img src="..." alt="Imagen 2" class="img-fluid rounded-circle">
            </div>

            <!-- Columna con fondo verde (bg-success) -->
            <div class="col-12 col-md-4 bg-success">
                <!-- rounded-0: elimina cualquier borde redondeado (esquinas rectas) -->
                <img src="..." alt="Imagen 3" class="img-fluid rounded-0">
                <p class="text-center">.img-fluid .rounded-0</p>
            </div>

        </div>

        <!-- ===== SEGUNDA FILA con margen superior (mt-4) ===== -->
        <div class="row mt-4">

            <!-- Columna con fondo oscuro (bg-dark) -->
            <div class="col-12 col-md-4 bg-dark">
                <!-- img-thumbnail: añade un borde, padding y fondo blanco alrededor de la imagen
                 (efecto de foto tipo "polaroid") -->
                <img src="..." alt="Imagen 4" class="img-thumbnail">
                <!-- text-white: texto en color blanco (necesario sobre fondo oscuro) -->
                <p class="text-center text-white">.img-thumbnail</p>
            </div>

            <!-- Columna con fondo celeste (bg-info) -->
            <div class="col-12 col-md-4 bg-info">
                <!-- float-end: flota la imagen hacia la derecha dentro de su contenedor -->
                <img src="..." alt="Imagen 5" class="float-end">
                <p class="text-center">.float-end</p>
            </div>

            <!-- Columna con fondo amarillo (bg-warning) -->
            <div class="col-12 col-md-4 bg-warning">
                <!-- mx-auto: centra horizontalmente aplicando margin auto a ambos lados
                 d-block: convierte la imagen en elemento bloque (necesario para que mx-auto funcione) -->
                <img src="..." alt="Imagen 6" class="mx-auto d-block">
                <p class="text-center">.mx-auto .d-block</p>
            </div>

        </div>

        <!-- ===== TERCERA FILA con margen superior (mt-4) ===== -->
        <div class="row mt-4">

            <!-- Columna con fondo gris (bg-secondary) -->
            <div class="col-12 col-md-4 bg-secondary">
                <!-- my-auto: centra verticalmente la imagen con margen automático arriba y abajo
                 d-inline: muestra la imagen como elemento en línea -->
                <img src="..." alt="Imagen 7" class="my-auto d-inline">
                <p class="text-center">.my-auto .d-inline</p>
            </div>

            <!-- Columna con fondo azul (bg-primary) -->
            <div class="col-12 col-md-4 bg-primary">
                <!-- d-inline-block: muestra como bloque en línea (combina propiedades de ambos)
                 mx-auto: centra horizontalmente -->
                <img src="..." alt="Imagen 8" class="d-inline-block mx-auto">
                <p class="text-center">.d-inline-block .mx-auto</p>
            </div>

            <!-- Columna con fondo celeste (bg-info) -->
            <div class="col-12 col-md-4 bg-info">
                <!-- float-start: flota la imagen hacia la izquierda dentro de su contenedor
                 rounded-end: redondea solo las esquinas del lado derecho de la imagen -->
                <img src="..." alt="Imagen 9" class="float-start rounded-end">
                <p class="text-center">.float-start</p>
            </div>

        </div>

    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
