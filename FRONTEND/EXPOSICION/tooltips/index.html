<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-5">

    <button class="btn btn-primary" data-bs-toggle="tooltip" data-bs-title="Guardar cambios">
        Guardar
    </button>

    <button class="btn btn-success" data-bs-toggle="tooltip" data-bs-title="Editar información">
        Editar
    </button>

    <button class="btn btn-danger" data-bs-toggle="tooltip" data-bs-title="Eliminar registro">
        Eliminar
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const tooltipTriggerList =
            document.querySelectorAll('[data-bs-toggle="tooltip"]')

        const tooltipList =
            [...tooltipTriggerList].map(
                tooltipTriggerEl =>
                    new bootstrap.Tooltip(tooltipTriggerEl)
            )
    </script>

</body>

</html>
